name: Refresh pkg.go.dev

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Inject SDK hash from git commit
        run: sed -i "s/SDKHash = \"local-dev\"/SDKHash = \"${{ github.sha }}\"/" version.go

      - name: Trigger pkg.go.dev re-index
        run: |
          MODULE="github.com/xiaohao0725/logs-sdk-go"
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "Refreshing ${MODULE}@${VERSION}..."
          GOPROXY=https://proxy.golang.org,direct go list -m ${MODULE}@${VERSION}
          echo "Done. https://pkg.go.dev/${MODULE}"

      - name: Notify logs-server
        run: |
          curl -s -X POST https://api.logs.codexs.cn/api/v1/sdk/webhook \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Secret: ${{ secrets.WEBHOOK_SECRET }}" \
            -d "{\"sdk_type\":\"go\",\"sdk_version\":\"${GITHUB_REF#refs/tags/}\",\"sdk_hash\":\"${{ github.sha }}\"}"
